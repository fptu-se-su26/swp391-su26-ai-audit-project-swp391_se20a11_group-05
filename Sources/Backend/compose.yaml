version: '3.8'

services:
  # ─── PostgreSQL + PGVector Service ─────────────────────────────────
  postgres-rag:
    image: pgvector/pgvector:pg16
    container_name: smartcity-postgres-rag
    environment:
      POSTGRES_DB: ragdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    networks:
      - smartcity-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ragdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── pgAdmin Service (Công cụ quản lý trực quan) ─────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: smartcity-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@smartcity.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    networks:
      - smartcity-network
    depends_on:
      - postgres-rag
    restart: unless-stopped

networks:
  smartcity-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
