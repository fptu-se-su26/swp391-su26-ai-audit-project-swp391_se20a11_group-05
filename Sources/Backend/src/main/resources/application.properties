spring.application.name=SmartCity
server.port=8081
spring.profiles.active=rag

# ═══════════════════════════════════════════════════════════════
# DATABASE — Dùng biến môi trường thay vì hardcode
# ═══════════════════════════════════════════════════════════════
# Mặc định: PostgreSQL (Yêu cầu bắt buộc cho hệ thống Smart City RAG)
# Production: set DB_URL, DB_USERNAME, DB_PASSWORD
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/smartcity_db}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# JPA/Hibernate properties
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ═══════════════════════════════════════════════════════════════
# JWT — BẮT BUỘC set biến môi trường JWT_SECRET khi production
# ═══════════════════════════════════════════════════════════════
# Secret key cho JWT (tối thiểu 256 bits cho HS256).
# ⚠️  Set biến môi trường JWT_SECRET = một chuỗi ngẫu nhiên dài ít nhất 32 ký tự
#     Trên Windows: $env:JWT_SECRET="<random-64-char-string>"
#     Trên Linux:   export JWT_SECRET="<random-64-char-string>"
jwt.secret=${JWT_SECRET:}
jwt.expiration-ms=604800000

# ─── Groq AI API Key Pool ───────────────────────────────────────
# Thêm nhiều key cách nhau bởi dấu phẩy để tăng throughput
# Lấy key miễn phí tại: https://console.groq.com/keys
groq.api-keys=${GROQ_API_KEYS:}
groq.model=${GROQ_MODEL:llama-3.3-70b-versatile}
groq.cooling-seconds=60

# ─── Gemini API (Fallback khi Groq pool cạn) ─────────────────────
# Lấy key tại: https://aistudio.google.com/app/apikey
# Hỗ trợ nhiều key: gemini.api-keys=key1,key2
gemini.api-keys=${GEMINI_API_KEYS:}
gemini.model=${GEMINI_MODEL:gemini-1.5-flash}
gemini.cooling-seconds=30

# ─── Admin API Security (AdminApiKeyFilter) ───────────────────────
# Header: X-Admin-Token: <giá trị này>
# Bảo vệ: /api/ai/pool-reset, /api/ai/pool-stats, /api/ai/metrics
# ⚠️  Set ADMIN_API_TOKEN trong biến môi trường cho production
admin.api-token=${ADMIN_API_TOKEN:}

# ─── WebClient (reactive) ────────────────────────────────────────
spring.codec.max-in-memory-size=5MB

# ═══════════════════════════════════════════════════════════════
# FILE UPLOAD
# ═══════════════════════════════════════════════════════════════
file.upload-dir=uploads
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ─── Scheduling (cho GroqKeyPool + GeminiKeyPool recovery) ───────
spring.task.scheduling.pool.size=2

