# =================================================================
# SUPABASE DEPLOYMENT CONFIGURATION
# Profile: supabase 
# Chạy với: java -jar app.jar --spring.profiles.active=supabase
# =================================================================

spring.application.name=SmartCity-Supabase

# ─── Supabase PostgreSQL + PGVector ──────────────────────────────
# Lấy URL này ở mục Project Settings > Database > Connection string (URI)
# LƯU Ý QUAN TRỌNG: 
# 1. Với Spring Boot (JPA), bắt buộc thêm tham số ?prepareThreshold=0 vào cuối URL khi dùng Supabase Connection Pooler (port 6543)
# 2. Bạn có thể set biến môi trường SUPABASE_DB_URL thay vì hardcode ở đây để bảo mật.
spring.datasource.url=${SUPABASE_DB_URL:jdbc:postgresql://aws-0-ap-southeast-1.pooler.supabase.com:6543/postgres?prepareThreshold=0}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${SUPABASE_DB_USER:postgres.your_project_id}
spring.datasource.password=${SUPABASE_DB_PASSWORD:your_password}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ─── JPA / Hibernate ─────────────────────────────────────────────
# Mặc định để 'update' để tự động tạo bảng (sau này deploy production ổn định thì đổi thành 'validate')
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ─── Connection Pool (HikariCP) ──────────────────────────────────
# Tối ưu hóa cho Supabase Transaction Pooler để tránh lỗi "too many clients"
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=20000
