spring.application.name=SmartCity-Test
server.port=0

# H2 in-memory for tests
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# JWT test config
jwt.secret=TestJWTSecretKeyThatIsAtLeast256BitsLongForHS256Algorithm!!!!
jwt.expiration-ms=3600000

# Mock AI keys for tests
groq.api-keys=test-key-1
groq.model=test-model
gemini.api-keys=test-key-1
gemini.model=test-model

admin.api-token=test-admin-token
