# =================================================================
# SUPABASE DEPLOYMENT CONFIGURATION
# Profile: supabase
# Chạy với: java -jar app.jar --spring.profiles.active=supabase
# =================================================================

spring.application.name=SmartCity-Supabase

# ─── Supabase PostgreSQL + PGVector ──────────────────────────────
# Lấy URL này ở mục Project Settings > Database > Connection string (URI)
# ⚠️  BẢO MẬT: Đặt SUPABASE_DB_URL, SUPABASE_DB_USER, SUPABASE_DB_PASSWORD
#    dưới dạng biến môi trường, KHÔNG hardcode trong file này.
spring.datasource.url=${SUPABASE_DB_URL:jdbc:postgresql://aws-0-ap-southeast-1.pooler.supabase.com:6543/postgres?prepareThreshold=0}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${SUPABASE_DB_USER:postgres.ojbwbbqmqxyxwwujzokm}
# BẠN CẦN ĐIỀN MẬT KHẨU DATABASE VÀO ĐÂY ĐỂ CHẠY ĐƯỢC:
spring.datasource.password=${SUPABASE_DB_PASSWORD:emmuoilaichi77}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ─── JPA / Hibernate ─────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ─── Connection Pool (HikariCP) ──────────────────────────────────
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=20000

# Disable Docker Compose support
spring.docker.compose.enabled=false
